<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DETRAN</title>
  </head>
  <body>
    <h1>Sistema de Multas</h1>
    Velocidade do carro:
    <input type="number" name="txtvelocidade" id="txtvelocidade" /> Km/h
    <input type="button" value="Verificar" onclick="calcular()" />
    <div id="resultado"></div>
    <script>
      function calcular() {
        var txtteste = window.document.getElementById("txtvelocidade");
        var resultado = window.document.querySelector("div#resultado");
        var velocidade = Number(txtteste.value);
        resultado.innerHTML = `<p>Sua velocidade atual é de  <strong>${velocidade}Km/h.</strong></p>`;
        if (velocidade > 60) {
          resultado.innerHTML += `<p>Voce foi multado!</p>`;
        } else {
          resultado.innerHTML += `<p>Voce não foi multado!</p>`;
        }
      }
    </script>
  </body>
</html>
