<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu primeiro programa em Javascript</title>
    <style>
        body { 
            background-color: lightblue;
            color: white;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: black;
        }
    </style>
  </head>
  <body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldicao</p>
    <script>
        var n1 = Number.parseInt(window.prompt('Digite um número: '))
        var n2 = window.prompt('Digite outro número: ')
        var n3 = Number(window.prompt('Digite mais um valor!'))
        var soma = n1 + Number.parseFloat(n2) + n3
        window.alert(`A soma entre ${n1} , ${n2} e ${n3} e igual a ${soma}. `)
    </script>
  </body>
</html>
