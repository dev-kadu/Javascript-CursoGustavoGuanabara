<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Dom</title>
    <style>
        div#area {
            font: normal 20pt Arial;
            background-color: aquamarine;
            height: 200px;
            width: 200px;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>
    <script>
        var area = window.document.querySelector('div#area')
        area.addEventListener('click', clicar)
        area.addEventListener('mouseenter', entrar)
        area.addEventListener('mouseout', saiu)
        function clicar() {
            area.innerText = 'clicou'
            area.style.background = 'darkred'

        }
        function entrar() {
            area.innerText = 'entrou'
            area.style.background = 'darkcyan'
        }
        function saiu() {
            area.innerText = 'saiu'
            area.style.background = 'aquamarine'
        }
    </script>
</body>
</html>
